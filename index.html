<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="울산대학교 채용공고 생성기 - 전문적이고 일관된 채용공고를 쉽게 만들어보세요">
  <meta name="theme-color" content="#2B7A3D">
  <title>울산대학교 채용공고 생성기</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e8f0e5 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #333;
    }

    .settings-btn {
      position: fixed;
      top: 2rem;
      right: 2rem;
      z-index: 999;
      padding: 0.5rem 1rem;
      background: #f0f7ed;
      color: #2B7A3D;
      border: 1px solid #d4e8d1;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .settings-btn:hover {
      background: #e8f2e4;
    }

    #settingsModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .settings-content {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .settings-content h2 {
      color: #2B7A3D;
      margin-bottom: 1rem;
      font-size: 18px;
      font-weight: 700;
    }

    .settings-content p {
      font-size: 13px;
      color: #666;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .settings-content label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2B7A3D;
      margin-bottom: 0.5rem;
    }

    .settings-content input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-family: monospace;
      font-size: 12px;
    }

    .settings-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .settings-buttons button {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-save {
      background: #2B7A3D;
      color: white;
    }

    .btn-cancel {
      background: #f0f7ed;
      color: #2B7A3D;
      border: 1px solid #d4e8d1;
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .header h1 {
      font-size: 28px;
      color: #5F5E5A;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .header p {
      font-size: 14px;
      color: #666;
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .form-section {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(43, 122, 61, 0.1);
      max-height: 900px;
      overflow-y: auto;
    }

    .preview-section {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(43, 122, 61, 0.1);
      overflow-y: auto;
      max-height: 900px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #5F5E5A;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #D4E8D1;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #5F5E5A;
      margin-bottom: 0.5rem;
    }

    .form-group label .required {
      color: #D4870E;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2B7A3D;
      box-shadow: 0 0 0 3px rgba(43, 122, 61, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
      line-height: 1.5;
    }

    .help-text {
      font-size: 11px;
      color: #999;
      margin-top: 0.35rem;
    }

    .form-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-columns .form-group {
      margin-bottom: 0;
    }

    .info-box {
      background: #F0F7ED;
      border-left: 4px solid #2B7A3D;
      padding: 1rem;
      margin-bottom: 1.5rem;
      border-radius: 6px;
    }

    .info-box strong {
      color: #2B7A3D;
      display: block;
      margin-bottom: 0.35rem;
      font-size: 12px;
    }

    .info-box p {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .ai-section {
      margin-bottom: 2rem;
      padding: 1rem;
      background: #f0f7ed;
      border-radius: 8px;
      border-left: 4px solid #2B7A3D;
    }

    .ai-section label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2B7A3D;
      margin-bottom: 0.5rem;
    }

    .ai-section textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d4e8d1;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      min-height: 80px;
      margin-bottom: 0.75rem;
    }

    .ai-status {
      font-size: 11px;
      color: #999;
      margin-top: 0.35rem;
    }

    .button-group {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
      flex-wrap: wrap;
      position: sticky;
      bottom: 0;
      background: white;
      padding: 1rem 0;
      border-top: 1px solid #eee;
    }

    button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #2B7A3D;
      color: white;
      flex: 1;
      min-width: 120px;
    }

    .btn-primary:hover {
      background: #1F5A2C;
      box-shadow: 0 4px 12px rgba(43, 122, 61, 0.3);
    }

    .btn-secondary {
      background: #F0F7ED;
      color: #2B7A3D;
      border: 1px solid #D4E8D1;
    }

    .btn-secondary:hover {
      background: #E8F2E4;
    }

    .preview-empty {
      color: #999;
      text-align: center;
      padding: 3rem 1rem;
      font-size: 13px;
    }

    @media (max-width: 1024px) {
      .content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<!-- 설정 버튼 -->
<button class="settings-btn" onclick="openSettings()">⚙️ 설정</button>

<!-- 설정 모달 -->
<div id="settingsModal">
  <div class="settings-content">
    <h2>⚙️ API 키 설정</h2>
    <p>Anthropic API 키를 한 번 설정하면, 사용자들은 그냥 텍스트를 붙여넣고 버튼만 클릭하면 됩니다.</p>
    
    <label>API 키:</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    
    <p style="font-size: 11px; color: #999;">
      🔐 API 키는 이 브라우저에만 저장되며, 서버로 전송되지 않습니다.<br>
      발급받기: <a href="https://console.anthropic.com" target="_blank" style="color: #2B7A3D;">console.anthropic.com</a>
    </p>
    
    <div class="settings-buttons">
      <button class="btn-save" onclick="saveApiKey()">💾 저장</button>
      <button class="btn-cancel" onclick="closeSettings()">취소</button>
    </div>
  </div>
</div>

<div class="main-container">
  <div class="header">
    <h1>울산대학교 채용공고 생성기</h1>
    <p>전문적이고 일관된 채용공고를 쉽게 만들어보세요</p>
  </div>

  <div class="content">
    <div class="form-section">
      <div class="section-title">📋 기본 정보</div>

      <div class="info-box">
        <strong>💡 팁</strong>
        <p>필수 항목(*)만 입력해도 공고가 생성됩니다. 선택 항목은 있으면 추가하세요.</p>
      </div>

      <div class="ai-section">
        <label>🤖 AI 자동 입력</label>
        <textarea id="aiInput" placeholder="채용공고 텍스트를 여기에 붙여넣으세요.&#10;예) 인권센터 계약직 모집. 모집인원 1명, 급여 월 291만원~349만원..."></textarea>
        <button class="btn-primary" onclick="analyzeTextWithAI()" style="width: 100%;">🤖 텍스트 자동 분석</button>
        <div class="ai-status" id="aiStatus"></div>
      </div>

      <form id="recruitmentForm">
        <div class="form-columns">
          <div class="form-group">
            <label>공고명 <span class="required">*</span></label>
            <input type="text" id="positionTitle" placeholder="예) 인권센터 계약직" required>
          </div>
          <div class="form-group">
            <label>모집 부서 <span class="required">*</span></label>
            <input type="text" id="department" placeholder="예) 인권센터" required>
          </div>
        </div>

        <div class="form-columns">
          <div class="form-group">
            <label>고용 형태 <span class="required">*</span></label>
            <select id="employmentType" required>
              <option value="">선택하세요</option>
              <option>정규직</option>
              <option>기간제</option>
              <option>무기계약직</option>
              <option>계약직</option>
            </select>
          </div>
          <div class="form-group">
            <label>모집 인원 <span class="required">*</span></label>
            <input type="text" id="headcount" placeholder="예) 1명" required>
          </div>
        </div>

        <div class="form-columns">
          <div class="form-group">
            <label>근무 시작 예정일 <span class="required">*</span></label>
            <input type="date" id="startDate" required onchange="document.getElementById('deadline').focus();">
          </div>
          <div class="form-group">
            <label>지원 마감일 <span class="required">*</span></label>
            <input type="date" id="deadline" required onchange="document.getElementById('position').focus();">
          </div>
        </div>

        <hr style="margin: 2rem 0; border: none; border-top: 1px solid #eee;">
        <div class="section-title">상세 정보 (선택)</div>

        <div class="form-group">
          <label>직급/직위</label>
          <input type="text" id="position" placeholder="예) 선임금">
        </div>

        <div class="form-columns">
          <div class="form-group">
            <label>급여/연봉</label>
            <input type="text" id="salary" placeholder="예) 월 291만원 ~ 349만원">
          </div>
          <div class="form-group">
            <label>근무 시간</label>
            <input type="text" id="workHours" placeholder="예) 주 5일, 09:00 ~ 18:00">
          </div>
        </div>

        <div class="form-group">
          <label>주요 업무</label>
          <textarea id="responsibilities" placeholder="- 업무 내용&#10;- 업무 내용"></textarea>
        </div>

        <div class="form-group">
          <label>지원 자격</label>
          <textarea id="qualifications" placeholder="- 자격 요건&#10;- 자격 요건"></textarea>
        </div>

        <div class="form-group">
          <label>우대 사항</label>
          <textarea id="preferences" placeholder="- 우대 사항&#10;- 우대 사항"></textarea>
        </div>

        <div class="form-group">
          <label>제출 서류</label>
          <textarea id="documents" placeholder="- 이력서 및 자기소개서&#10;- 졸업증명서"></textarea>
        </div>

        <div class="form-group">
          <label>전형 일정</label>
          <textarea id="schedule" placeholder="2026.3.16(월)&#10;지원서 접수&#10;&#10;2026.3.30(월) 18:00&#10;1차 발표"></textarea>
        </div>

        <div class="form-group">
          <label>추가 정보 / FAQ</label>
          <textarea id="additionalInfo" placeholder="Q. 질문&#10;A. 답변"></textarea>
        </div>

        <div class="form-group">
          <label>문의 연락처</label>
          <input type="text" id="contact" placeholder="예) 인사팀 (052-259-1054)">
        </div>

        <div class="button-group">
          <button type="button" class="btn-primary" onclick="generatePreview()">✓ 미리보기 생성</button>
          <button type="button" class="btn-secondary" onclick="resetForm()">초기화</button>
        </div>
      </form>
    </div>

    <div class="preview-section">
      <div class="section-title">👁️ 미리보기</div>
      <div id="previewContainer" class="preview-empty">정보를 입력하고 "미리보기 생성" 버튼을 클릭하세요.</div>
    </div>
  </div>
</div>

<script>
// 설정 함수들
function openSettings() {
  document.getElementById('settingsModal').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsModal').style.display = 'none';
  document.getElementById('apiKeyInput').value = '';
}

function saveApiKey() {
  const apiKey = document.getElementById('apiKeyInput').value;
  if (!apiKey || apiKey.length < 20) {
    alert('유효한 API 키를 입력해주세요.');
    return;
  }
  localStorage.setItem('anthropic_api_key', apiKey);
  alert('✅ API 키가 저장되었습니다!');
  closeSettings();
}

// AI 자동 분석 함수
async function analyzeTextWithAI() {
  const aiInput = document.getElementById('aiInput').value;
  const statusDiv = document.getElementById('aiStatus');
  
  if (!aiInput.trim()) {
    alert('텍스트를 입력해주세요.');
    return;
  }

  const apiKey = localStorage.getItem('anthropic_api_key');
  
  if (!apiKey) {
    alert('⚙️ 먼저 API 키를 설정해주세요.');
    openSettings();
    return;
  }

  statusDiv.textContent = '🔄 AI 분석 중...';
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-1',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: `채용공고 텍스트를 분석하고 JSON으로 반환하세요:\n\n${aiInput}\n\n{"positionTitle":"","department":"","employmentType":"","headcount":"","startDate":"YYYY-MM-DD","deadline":"YYYY-MM-DD","position":"","salary":"","workHours":"","responsibilities":"","qualifications":"","preferences":"","documents":"","schedule":"","contact":""}`
        }]
      })
    });

    if (!response.ok) {
      throw new Error('API 요청 실패');
    }

    const data = await response.json();
    const content = data.content[0].text;
    const jsonMatch = content.match(/\{[\s\S]*\}/);
    
    if (!jsonMatch) {
      throw new Error('유효한 응답을 받지 못했습니다.');
    }

    const result = JSON.parse(jsonMatch[0]);

    if (result.positionTitle) document.getElementById('positionTitle').value = result.positionTitle;
    if (result.department) document.getElementById('department').value = result.department;
    if (result.employmentType) document.getElementById('employmentType').value = result.employmentType;
    if (result.headcount) document.getElementById('headcount').value = result.headcount;
    if (result.startDate) document.getElementById('startDate').value = result.startDate;
    if (result.deadline) document.getElementById('deadline').value = result.deadline;
    if (result.position) document.getElementById('position').value = result.position;
    if (result.salary) document.getElementById('salary').value = result.salary;
    if (result.workHours) document.getElementById('workHours').value = result.workHours;
    if (result.responsibilities) document.getElementById('responsibilities').value = result.responsibilities;
    if (result.qualifications) document.getElementById('qualifications').value = result.qualifications;
    if (result.preferences) document.getElementById('preferences').value = result.preferences;
    if (result.documents) document.getElementById('documents').value = result.documents;
    if (result.schedule) document.getElementById('schedule').value = result.schedule;
    if (result.contact) document.getElementById('contact').value = result.contact;

    statusDiv.textContent = '✅ 완료!';
    document.getElementById('aiInput').value = '';
    setTimeout(() => generatePreview(), 500);

  } catch (error) {
    statusDiv.textContent = '❌ 오류: ' + error.message;
  }
}

function generatePreview() {
  alert('미리보기 기능은 원본 파일에서 확인하세요.');
}

function resetForm() {
  document.getElementById('recruitmentForm').reset();
  document.getElementById('previewContainer').innerHTML = '<div class="preview-empty">정보를 입력하고 "미리보기 생성" 버튼을 클릭하세요.</div>';
}
</script>

</body>
</html>
